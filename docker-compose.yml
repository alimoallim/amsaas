version: '3.8'

services:
  #-------------------------------------------------------------------------
  # TIER 1: THE INBOUND ENTRYPOINT REVERSE-PROXY ROUTING LAYER (NGINX)
  #-------------------------------------------------------------------------
  nginx-router:
    image: nginx:1.25-alpine
    container_name: saas-nginx-router
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./laravel:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - saas-isolated-network
    depends_on:
      - laravel-engine

  #-------------------------------------------------------------------------
  # TIER 2: THE BUSINESS LOGIC PROCESSING RUNTIME ENGINE (LARAVEL FRAMEWORK)
  #-------------------------------------------------------------------------
  laravel-engine:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    container_name: saas-laravel-engine
    restart: unless-stopped
    volumes:
      - ./laravel:/var/www/html
    networks:
      - saas-isolated-network
    depends_on:
      - postgres-db

  #-------------------------------------------------------------------------
  # TIER 3: THE HIGH-SECURITY ISOLATED FINANCIAL DATA LAYER (POSTGRESQL)
  #-------------------------------------------------------------------------
  #-------------------------------------------------------------------------
  # Vue ERP SPA (Vite dev server — open http://localhost:5173, not :8080)
  #-------------------------------------------------------------------------
  frontend-dev:
    image: node:22-alpine
    container_name: saas-frontend-dev
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    networks:
      - saas-isolated-network

  #-------------------------------------------------------------------------
  # TIER 3: THE HIGH-SECURITY ISOLATED FINANCIAL DATA LAYER (POSTGRESQL)
  #-------------------------------------------------------------------------
  postgres-db:
    image: postgres:16-alpine
    container_name: saas-postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: property_saas_ledger
      POSTGRES_USER: cloud_finops_admin
      POSTGRES_PASSWORD: SecurePolymerString992#
    ports:
      - "5432:5432"
    volumes:
      - postgres-persistent-store:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - saas-isolated-network

#---------------------------------------------------------------------------
# GLOBAL NETWORKING & PERSISTENCE STORAGE LAYER PARAMETERS
#---------------------------------------------------------------------------
networks:
  saas-isolated-network:
    driver: bridge

volumes:
  postgres-persistent-store:
    driver: local
  frontend-node-modules:
    driver: local
